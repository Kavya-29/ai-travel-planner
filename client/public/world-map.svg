<svg width="2000" height="1000" viewBox="0 0 2000 1000" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <rect width="2000" height="1000" fill="transparent"/>
  
  <g fill="none" stroke="#60a5fa" stroke-width="3" filter="url(#neonGlow)" opacity="0.9">
    <!-- North America -->
    <path d="M250,150 L450,150 L550,250 L500,400 L400,450 L300,400 L200,300 Z" />
    <!-- South America -->
    <path d="M480,500 L600,500 L650,650 L550,850 L450,700 Z" />
    <!-- Europe -->
    <path d="M850,150 L1050,150 L1100,250 L1000,350 L850,300 Z" />
    <!-- Africa -->
    <path d="M900,400 L1100,400 L1150,550 L1050,750 L950,700 L850,550 Z" />
    <!-- Asia -->
    <path d="M1150,100 L1500,100 L1600,300 L1550,500 L1350,550 L1200,450 Z" />
    <!-- Australia -->
    <path d="M1450,650 L1600,650 L1650,750 L1550,850 L1450,800 Z" />
  </g>

  <!-- Grid lines -->
  <g stroke="#ffffff" stroke-width="1" opacity="0.1">
    <line x1="0" y1="200" x2="2000" y2="200" />
    <line x1="0" y1="400" x2="2000" y2="400" />
    <line x1="0" y1="600" x2="2000" y2="600" />
    <line x1="0" y1="800" x2="2000" y2="800" />
    <line x1="500" y1="0" x2="500" y2="1000" />
    <line x1="1000" y1="0" x2="1000" y2="1000" />
    <line x1="1500" y1="0" x2="1500" y2="1000" />
  </g>
</svg>
